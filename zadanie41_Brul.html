<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <title>Bruliński Z41_JS</title>
    <style>
        h1 { text-transform: uppercase; }
    </style>
</head>
<body>
    <h1>Proste działania</h1>

    <h2>Bruliński klasa 3K</h2>

    <label for="a">Podaj pierwszą liczbę:</label>
    <input type="number" id="a">
    <br><br>

    <label for="b">Podaj drugą liczbę:</label>
    <input type="number" id="b">
    <br><br>

    <input type="button" value="DODAWANIE" onclick="suma_bru()">
    <input type="button" value="ODEJMOWANIE" onclick="roznica_bru()">
    <input type="button" value="MNOŻENIE" onclick="iloczyn_bru()">
    <input type="button" value="DZIELENIE" onclick="iloraz_bru()">
    <input type="button" value="TEORIA-Bruliński" onclick="teoria_bru()">

    <div id="wynik" style="margin-top:20px;"></div>

    <script>
        function suma_bru() {
            var a = document.getElementById("a").value;
            var b = document.getElementById("b").value;

            if (a == "" || b == "") {
                document.getElementById("wynik").innerHTML = "Proszę uzupełnić obie liczby.";
            } else {
                a = parseFloat(a);
                b = parseFloat(b);
                var suma = a + b;
                document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + suma.toFixed(2);
            }
        }

        function roznica_bru() {
            var a = document.getElementById("a").value;
            var b = document.getElementById("b").value;

            if (a == "" || b == "") {
                document.getElementById("wynik").innerHTML = "Proszę uzupełnić obie liczby.";
            } else {
                a = parseFloat(a);
                b = parseFloat(b);
                var roznica = a - b;
                document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + roznica.toFixed(2);
            }
        }

        function iloczyn_bru() {
            var a = document.getElementById("a").value;
            var b = document.getElementById("b").value;

            if (a == "" || b == "") {
                document.getElementById("wynik").innerHTML = "Proszę uzupełnić obie liczby.";
            } else {
                a = parseFloat(a);
                b = parseFloat(b);
                var iloczyn = a * b;
                document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + iloczyn.toFixed(2);
            }
        }

        function iloraz_bru() {
            var a = document.getElementById("a").value;
            var b = document.getElementById("b").value;

            if (a == "" || b == "") {
                document.getElementById("wynik").innerHTML = "Proszę uzupełnić obie liczby.";
            } else {
                a = parseFloat(a);
                b = parseFloat(b);

                if (b == 0) {
                    document.getElementById("wynik").innerHTML = "Nie wolno dzielić przez zero.";
                } else {
                    var iloraz = a / b;
                    document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + iloraz.toFixed(2);
                }
            }
        }

        function teoria_bru() {
            document.write("<font color=green size=4>Pierwsza linia kodu + opis</font><br>");
            document.write("<font color=red size=4>&lt;label for=&quot;a&quot;&gt;Podaj pierwszą liczbę:&lt;/label&gt; &lt;input type=&quot;number&quot; id=&quot;a&quot;&gt;</font><br>");
            document.write("<font color=green size=4>Ta linijka tworzy etykietę i pole liczbowe do wpisania pierwszej liczby. Etykieta jest powiązana z polem o id = a.</font><br><br>");

            document.write("<font color=green size=4>Druga linia kodu + opis</font><br>");
            document.write("<font color=red size=4>&lt;input type=&quot;button&quot; value=&quot;DODAWANIE&quot; onclick=&quot;suma_bru()&quot;&gt;</font><br>");
            document.write("<font color=green size=4>Ta linijka tworzy przycisk DODAWANIE. Kliknięcie uruchamia funkcję suma_bru().</font><br><br>");

            document.write("<font color=green size=4>Trzecia linia kodu + opis</font><br>");
            document.write("<font color=red size=4>var a = document.getElementById(&quot;a&quot;).value;</font><br>");
            document.write("<font color=green size=4>Ta linijka pobiera wartość wpisaną w pole o identyfikatorze a i zapisuje ją do zmiennej a.</font><br><br>");

            document.write("<font color=green size=4>Czwarta linia kodu + opis</font><br>");
            document.write("<font color=red size=4>if (a == &quot;&quot; || b == &quot;&quot;)</font><br>");
            document.write("<font color=green size=4>Ta linijka sprawdza, czy pierwsze lub drugie pole jest puste.</font><br><br>");

            document.write("<font color=green size=4>Piąta linia kodu + opis</font><br>");
            document.write("<font color=red size=4>document.getElementById(&quot;wynik&quot;).innerHTML = &quot;Wynik działania wynosi: &quot; + suma;</font><br>");
            document.write("<font color=green size=4>Ta linijka wyświetla w elemencie wynik tekst oraz obliczony rezultat działania.</font><br>");
        }
    </script>
</body>
</html>
<!-- Bruliński Z41_JS -->
