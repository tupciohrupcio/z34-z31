<!DOCTYPE html>
<html>
<body>
<div style="color:green;font-size:50px;">
<script language="JavaScript">
var m_Brul = prompt("m=", "");
var b_Brul;
var c_Brul;
var a_Brul = parseFloat(m_Brul);
b_Brul = a_Brul + 1;
c_Brul = a_Brul * (a_Brul + 1);
document.write("1/" + a_Brul + " = 1/" + b_Brul + " + 1/" + c_Brul + "<br>");
</script>
</div>
</body>
</html>
