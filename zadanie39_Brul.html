<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Bruliński Z39_JS</title>
</head>
<body>

<h1 style="color:green;">MENU</h1>
<h2 style="color:red;">1-CZERWONY</h2>
<h2 style="color:blue;">2-NIEBIESKI</h2>

<input type="button" name="brulinski" value="Oblicz" onclick="fun_bru()" />

<script>
function fun_bru() {
    var opcja_dana_bru = prompt("Podaj kolor lub numer: ", "");

    if (opcja_dana_bru == 1 || opcja_dana_bru.toLowerCase() == "czerwony") {
        document.write('<font color="red" size="7">wczytałeś kolor czerwony</font><br />');
    }
    else if (opcja_dana_bru == 2 || opcja_dana_bru.toLowerCase() == "niebieski") {
        document.write('<font color="blue" size="1">wczytałeś kolor niebieski</font><br />');
    }
}
</script>

</body>
</html>
<!-- Bruliński Z39_JS -->
