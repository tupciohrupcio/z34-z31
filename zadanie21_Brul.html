<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Obliczanie objętości i pola powierzchni walca</title>

<script language="JavaScript">

function V(r, h) {
    let r_liczba = parseFloat(r);
    let h_liczba = parseFloat(h);

    let V_wynik = Math.PI * r_liczba * r_liczba * h_liczba;

    document.getElementsByName('obj')[0].value = V_wynik.toFixed(2);
    alert("V = " + V_wynik.toFixed(2) + " cm^3");
    pokaz1.innerHTML = "V = " + V_wynik.toFixed(2) + " cm^3";
}

function Pc(r, h) {
    let r_liczba = parseFloat(r);
    let h_liczba = parseFloat(h);

    let Pc_wynik = 2 * Math.PI * r_liczba * r_liczba + 2 * Math.PI * r_liczba * h_liczba;

    document.getElementsByName('pole')[0].value = Pc_wynik.toFixed(2);
    alert("Pc = " + Pc_wynik.toFixed(2) + " cm^2");
    pokaz2.innerHTML = "Pc = " + Pc_wynik.toFixed(2) + " cm^2";
}

</script>
</head>

<body>
<h2>Obliczanie V i Pc walca</h2>
<br>

<form name="formularz" action="..." 
      onsubmit="V(this.promien.value, this.wysokosc.value);
                Pc(this.promien.value, this.wysokosc.value);
                return false">

    Podaj r = <input size="6" name="promien">
    Podaj h = <input size="6" name="wysokosc">
    <br><br>

    <input type="submit" value="Oblicz">
    <br><br>

    V = <input size="6" name="obj">
    Pc = <input size="6" name="pole">
</form>

<table>
    <tr id="pokaz1"></tr>
    <tr id="pokaz2"></tr>
</table>

</body>
</html>
