<!DOCTYPE html>
<html lang="pl-PL">
<head>
    <meta charset="UTF-8">
    <title>Bruliński Z35_JS</title>
</head>

<body>

<div style="color:red;font-size:50px;">

<script>

var x = prompt("Podaj liczbę x=", "");

var a_dana_bru = parseFloat(x);

document.write("Wczytana liczba x = " + a_dana_bru + "<br>");

if (a_dana_bru > 0)
{
    document.write("Wczytana liczba jest większa od 0<br>");
}

if (a_dana_bru == 0)
{
    document.write("Wczytana liczba jest równa 0<br>");
}

if (a_dana_bru < 0)
{
    document.write("Wczytana liczba jest mniejsza od 0<br>");
}

</script>

</div>

</body>
</html>
