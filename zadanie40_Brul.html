<!DOCTYPE html>
<html lang="pl-PL">
<head>
    <meta charset="UTF-8">
    <title>Bruliński Z40_JS</title>
</head>
<body>
<div style="color:red;font-size:50px;">
<script language="JavaScript">
var x = prompt("podaj argument x=", "");
var x_bru = parseFloat(x);

document.write("wykonał Bruliński<br>");
document.write("czytany argument x=" + x_bru.toFixed(2) + "<br>");

function f_bru(x_bru)
{
    if (x_bru >= 1)
    {
        return 1;
    }
    if ((x_bru >= -2) && (x_bru < 1))
    {
        return x_bru * x_bru;
    }
    if (x_bru < -2)
    {
        return 4;
    }
}

document.write("f(" + x_bru.toFixed(2) + ")=" + f_bru(x_bru).toFixed(2) + "<br>");
</script>
</div>
</body>
</html>
<!-- Bruliński Z40_JS -->
