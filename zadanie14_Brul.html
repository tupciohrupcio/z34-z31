<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Bruliński Zadanie 14</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial;
            font-size: 24px;
            padding: 20px;
        }
        h2 {
            color: red;
        }
    </style>
    <script>
        function rozkladEgipski() {
            // m = 4, ułamek: 1/4
            let m = 4;
            let wynik = "Rozkład ułamka 1/" + m + " na trzy ułamki egipskie:<br>";

            // Rozkład: 1/4 = 1/6 + 1/30 + 1/20
            let a = 6;
            let b = 30;
            let c = 20;

            // Obliczamy wartości sprawdzające
            let suma = 1/a + 1/b + 1/c;
            let oryginal = 1/m;

            wynik += `1/${m} = 1/${a} + 1/${b} + 1/${c}<br>`;
            wynik += `Suma po prawej stronie = ${suma.toFixed(5)}<br>`;
            wynik += `Oryginalny ułamek = ${oryginal.toFixed(5)}<br>`;

            if (Math.abs(suma - oryginal) < 0.00001) {
                wynik += `<b style="color:green;">✅ Rozkład poprawny!</b>`;
            } else {
                wynik += `<b style="color:red;">❌ Rozkład błędny!</b>`;
            }

            document.getElementById("wynik").innerHTML = wynik;
        }
    </script>
</head>
<body>
    <h2>Bruliński Zadanie 14</h2>
    <p>Temat: Rozkład ułamka egipskiego na trzy ułamki egipskie.</p>
    <button onclick="rozkladEgipski()">Pokaż rozkład dla 1/4</button>
    <div id="wynik"></div>
</body>
</html>
