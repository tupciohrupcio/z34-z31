<!DOCTYPE html>
<html lang="pl-PL">
<head>
<meta charset="UTF-8">
<title>Bruliński Z36_JS</title>
</head>

<body>

<script>

var x = prompt("Podaj liczbę =", "");

var liczba_bru = parseInt(x);

if (liczba_bru % 2 == 0)
{
document.write("<font color=red size=3>liczba jest parzysta</font><br>");
}

if (liczba_bru % 2 != 0)
{
document.write("<font color=silver size=5>liczba jest nieparzysta</font><br>");
}

</script>

</body>
</html>
